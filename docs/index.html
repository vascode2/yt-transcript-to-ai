const { useEffect, useRef } = React;

function Explainer() {
  const flowRef = useRef(null);

  useEffect(() => {
    if (typeof window.mermaid === 'undefined' || !flowRef.current) return;
    window.mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      themeVariables: {
        background: '#0E1116',
        primaryColor: '#161B22',
        primaryTextColor: '#E6EDF3',
        primaryBorderColor: '#3FB950',
        lineColor: '#7D8590',
        secondaryColor: '#1F2733',
        tertiaryColor: '#0E1116',
        fontFamily: '"JetBrains Mono", ui-monospace, monospace',
        fontSize: '13px',
      },
      flowchart: { curve: 'linear', padding: 16 },
      securityLevel: 'loose',
    });
    const id = `mmd-${Date.now()}`;
    const src = flowRef.current.dataset.src;
    window.mermaid.render(id, src).then(({ svg }) => {
      if (flowRef.current) flowRef.current.innerHTML = svg;
    });
  }, []);

  const flowSrc = `flowchart LR
    subgraph yt["youtube watch page"]
      P([player JSON<br/>+ caption tracks])
    end
    subgraph ext["extension/content.js (in your tab)"]
      direction LR
      M[mount toolbar]
      F{fetch transcript<br/>3 tiers}
      C1[Copy transcript<br/>button]
      C2[ChatGPT / Gemini<br/>buttons]
    end
    subgraph clip["clipboard / AI tab"]
      O1[(clipboard text)]
      O2[(chatgpt.com<br/>composer)]
      O3[(gemini.google.com<br/>composer)]
    end
    P --> M --> F
    F --> C1 --> O1
    F --> C2
    C2 --> O2
    C2 --> O3
    style P fill:#FFA657,stroke:#FFA657,color:#0E1116
    style M fill:#161B22,stroke:#3FB950,color:#E6EDF3
    style F fill:#161B22,stroke:#3FB950,color:#E6EDF3
    style C1 fill:#1F2733,stroke:#58A6FF,color:#E6EDF3
    style C2 fill:#1F2733,stroke:#58A6FF,color:#E6EDF3
    style O1 fill:#1F2733,stroke:#58A6FF,color:#E6EDF3
    style O2 fill:#1F2733,stroke:#58A6FF,color:#E6EDF3
    style O3 fill:#1F2733,stroke:#58A6FF,color:#E6EDF3`;

  const s = styles;

  return (
    <div style={s.page}>
      {/* Status bar */}
      <div style={s.statusBar}>
        <div style={s.statusLeft}>
          <span style={s.dot} />
          <span style={s.statusLabel}>SYSTEM · ONLINE</span>
          <span style={s.statusSep}>|</span>
          <span style={s.statusMeta}>last run · 2026-05-02 16:37:48 EDT · 0 errors</span>
        </div>
        <div style={s.statusRight}>
          <a href="https://github.com/vascode2/yt-transcript-to-ai" target="_blank" rel="noopener noreferrer" style={s.statusRightLink}>yt-transcript-to-ai</a>
          <span style={s.statusSep}> · </span>v1.3.4 · main
        </div>
      </div>

      <div style={s.body}>
        {/* HERO */}
        <header style={s.hero}>
          <div style={s.heroLeft}>
            <div style={s.heroEyebrow}>// yt-transcript-to-ai · chrome extension</div>
            <h1 style={s.h1}>Three buttons under every YouTube video: copy the transcript, or send it straight to ChatGPT or Gemini.</h1>
            <p style={s.lede}>
              An unpacked Chrome / Brave extension that mounts a small toolbar
              at the top of the right column on every watch page. <b>Copy
              transcript</b> puts the text on your clipboard. <b>ChatGPT</b>
              and <b>Gemini</b> open the AI in a new tab and paste the
              transcript + a summarize prompt right into the chat box.
              Browser-specific, not OS-specific — runs the same on macOS,
              Windows, and Linux.
            </p>
          </div>
          <div style={s.heroPanel}>
            <div style={s.heroPanelHead}>
              <span>● ● ●</span>
              <span style={s.heroPanelTitle}>content.js · console</span>
            </div>
            <div style={s.heroPanelBody}>
              <div><span style={s.logTime}>16:37:42</span> <span style={s.logOk}>✓</span> mounted toolbar · #secondary-inner</div>
              <div><span style={s.logTime}>16:37:43</span> <span style={s.logOk}>✓</span> prefetch transcript · v=rEDtfeh…</div>
              <div><span style={s.logTime}>16:37:45</span> <span style={s.logOk}>✓</span> cached · ko (auto) · 4,182 chars</div>
              <div><span style={s.logTime}>16:37:48</span> <span style={s.logOk}>✓</span> click · Copy transcript</div>
              <div><span style={s.logTime}>16:37:48</span> <span style={s.logOk}>✓</span> clipboard.writeText · 34ms</div>
              <div><span style={s.logTime}>16:37:48</span> <span style={s.logOk}>●</span> Copied (Korean, auto-generated).</div>

        </header>

            ['~30 ms', 'click → clipboard', '#58A6FF'],
            ['MV3', 'unpacked, no store', '#FFA657'],
            ['$0', 'no api keys needed', '#D2A8FF'],
          ].map(([n, l, c]) => (
            <div key={l} style={s.kpi}>
              <div style={{...s.kpiNum, color: c}}>{n}</div>
              <div style={s.kpiLabel}>{l}</div>
            </div>

        </div>

              </ul>
            </div>

              </ul>
            </div>
          </div>
        </section>

        {/* ARCHITECTURE */}
        <section style={s.section}>
          <div style={s.sectionHead}>
            <div style={s.sectionTag}>02 / architecture</div>
            <h2 style={s.h2}>What happens inside the YouTube tab</h2>
            <p style={s.dek}>

              player's caption tracks, prefetches the text in the background, and stages it on the
              clipboard the moment you click. The AI buttons piggy-back on <code style={s.code}>chrome.scripting</code>
              (a permission that lets the extension paste into a tab on another site) to drop the
              transcript straight into the ChatGPT or Gemini composer.
            </p>
          </div>

          <div style={s.archCard}>
            <div style={s.archCardHead}>
              <span style={s.archCardTitle}>extension.flow</span>
              <span style={s.archCardMeta}>manifest v3 · content + service worker · ~30 ms per click</span>
            </div>
            <div ref={flowRef} data-src={flowSrc} style={s.mermaidWrap} />
            <div style={s.archAnnotation}>
              <svg width="50" height="36" viewBox="0 0 50 36" fill="none" style={{ display: 'block' }}>
                <path d="M5 30 Q 25 5, 45 18" stroke="#FFD966" strokeWidth="2" fill="none" strokeLinecap="round" />
                <path d="M37 12 L 45 18 L 38 25" stroke="#FFD966" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
              <span style={s.archAnnotationText}>nothing leaves your browser!</span>
            </div>
          </div>

          <div style={s.stageGrid}>
            {[
              ['01', 'mount', 'content.js', 'On every watch page, inject a sticky toolbar at the top of the right column (#secondary-inner) above "In this video".'],
              ['02', 'prefetch', 'transcript cache', 'As soon as the player publishes caption tracks, fetch the transcript in the background so Copy is instant.'],
              ['03', 'fetch tiers', 'timedtext · innertube · panel', 'Three fallback paths: timedtext URL → InnerTube get_transcript → scrape the native transcript side-panel.'],
              ['04', 'copy', 'clipboard.writeText', 'Click writes pre-staged text inside the user-activation window. Fallback: refocus + execCommand("copy").'],
              ['05', 'handoff', 'chrome.scripting', 'AI buttons open chatgpt.com or gemini.google.com, paste the prompt into the composer, and try to send it.'],
            ].map(([n, name, tag, body]) => (
              <div key={n} style={s.stage}>
                <div style={s.stageHead}>
                  <span style={s.stageNum}>{n}</span>
                  <span style={s.stageName}>{name}</span>
                </div>
                <div style={s.stageTag}>{tag}</div>
                <p style={s.stageBody}>{body}</p>
              </div>
            ))}
          </div>
        </section>

        {/* INPUTS / OUTPUTS */}
        <section style={s.section}>
          <div style={s.sectionHead}>
            <div style={s.sectionTag}>03 / interface</div>
            <h2 style={s.h2}>What it asks for, what it gives back</h2>
            <p style={s.dek}>
              No accounts, no API keys, no cloud. The only thing you do is install the unpacked
              extension once. The permissions it asks for (host access — permission to read & write
              on a specific site) are all to make the AI buttons work.
            </p>
          </div>

                  <tr><td style={s.ioKey}>host: chatgpt.com</td><td style={s.ioVal}>inject the prompt + transcript into the composer</td></tr>

                <div style={s.ytChannel}>The Diary Of A CEO · 110K likes · 1 day ago</div>
              </div>
              <div style={s.ytRight}>
                {/* The actual extension toolbar, mounted above "In this video".
                    Three buttons are individually wrapped with red highlight boxes
                    to draw the reader's eye to the extension's contribution. */}
                <div style={s.toolbar}>
                  <span style={s.redHighlight}>
                    <button style={{...s.pill, ...s.pillPrimary}}>Copy transcript</button>
                  </span>
                  <span style={s.redHighlight}>
                    <button style={s.pill}>ChatGPT</button>
                  </span>
                  <span style={s.redHighlight}>
                    <button style={s.pill}>Gemini</button>

                </div>
                <div style={s.ytChips}>
                  <span style={{...s.ytChip, ...s.ytChipActive}}>All</span>
                  <span style={s.ytChip}>From your search</span>

                </div>
                <div style={s.ytRec}><div style={s.ytRecThumb} /><div><div style={s.ytRecTitle}>Arsenal v. Fulham | PREMIER LEAGUE HIGHLIGHTS</div><div style={s.ytRecMeta}>NBC Sports · 5.3K views · 1 hour ago</div></div></div>

              </div>
            </div>
          </div>

          <p style={s.captionNote}>
            The three red-boxed pills are the extension. Everything else (the chips, the recommendations) is
            YouTube. The toolbar is sticky — it stays in view while you scroll the right column.
          </p>
        </section>

        <footer style={s.footer}>
          <a href="https://github.com/vascode2/yt-transcript-to-ai" target="_blank" rel="noopener noreferrer" style={s.footerLink}>github.com/vascode2/yt-transcript-to-ai</a>

          <span style={s.footerSep}>·</span>
          <span>built with chrome mv3 · vanilla js · playwright (e2e)</span>
        </footer>
      </div>
    </div>
  );
}
