<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Summary</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Fast video notes</p>
        <h1>Paste a YouTube link and get the summary.</h1>
        <p class="hero-copy">
          This app pulls the available captions from a YouTube video, turns them into a readable
          summary, and highlights key moments with timestamps.
        </p>
      </section>

      <section class="panel">
        <form id="summary-form" class="summary-form">
          <label class="label" for="youtube-url">YouTube URL</label>
          <div class="input-row">
            <input
              id="youtube-url"
              name="url"
              type="url"
              placeholder="https://www.youtube.com/watch?v=..."
              required
            />
            <button type="submit" id="submit-button">Generate Summary</button>
          </div>
        </form>

        <p id="status" class="status" aria-live="polite"></p>

        <section id="results" class="results hidden">
          <div class="result-card">
            <p class="result-label">Video</p>
            <h2 id="video-title"></h2>
          </div>

          <div class="result-card">
            <p class="result-label">Summary</p>
            <p id="summary-text" class="body-copy"></p>
          </div>

          <div class="result-card">
            <p class="result-label">Key Points</p>
            <div id="key-points" class="key-points"></div>
          </div>

          <div class="result-card">
            <p class="result-label">Transcript Preview</p>
            <p id="transcript-preview" class="body-copy transcript-preview"></p>
          </div>
        </section>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
